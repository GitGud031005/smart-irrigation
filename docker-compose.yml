services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
      ADAFRUIT_IO_USERNAME: ${ADAFRUIT_IO_USERNAME}
      ADAFRUIT_IO_KEY: ${ADAFRUIT_IO_KEY}
      ADAFRUIT_IO_FEED_SOIL_MOISTURE: ${ADAFRUIT_IO_FEED_SOIL_MOISTURE:-soil}
      ADAFRUIT_IO_FEED_TEMPERATURE: ${ADAFRUIT_IO_FEED_TEMPERATURE:-temperature}
      ADAFRUIT_IO_FEED_HUMIDITY: ${ADAFRUIT_IO_FEED_HUMIDITY:-humidity}
      ADAFRUIT_IO_FEED_PUMP: ${ADAFRUIT_IO_FEED_PUMP:-pump}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
    restart: unless-stopped
